<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文格 AI 助手</title>
  </head>
  <body>
    <div id="root">
      <div
        class="excel-ai-boot"
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #f8fafc;
          color: #334155;
          font-family:
            system-ui,
            -apple-system,
            BlinkMacSystemFont,
            &quot;Segoe UI&quot;,
            sans-serif;
        "
      >
        <div style="text-align: center">
          <div
            style="
              width: 28px;
              height: 28px;
              margin: 0 auto 12px;
              border: 3px solid #dbeafe;
              border-top-color: #4f46e5;
              border-radius: 999px;
              animation: excel-ai-boot-spin 0.8s linear infinite;
            "
          ></div>
          <div style="font-size: 15px; font-weight: 600">正在加载 Excel AI...</div>
          <div style="margin-top: 6px; font-size: 12px; color: #64748b">首次打开会稍慢，请稍候</div>
        </div>
      </div>
    </div>
    <style>
      @keyframes excel-ai-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
