name: CI

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  desktop:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "8.0.422"
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: dotnet restore dotnet/Wengge.OfficeAutomation.sln --locked-mode
      - run: npm run office:audit
      - run: npm run lint
      - run: npm run governance:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run office:test
      - run: npm run build

  product-site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: product-site
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: product-site/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test

  excel-addin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: excel-addin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: excel-addin/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run manifest:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  ai-gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-gateway
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-gateway/package-lock.json
      - run: npm ci
      - run: npm test
