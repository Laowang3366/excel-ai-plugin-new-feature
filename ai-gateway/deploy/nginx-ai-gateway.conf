# Same-origin AI gateway fronting (production sketch).
# Gateway process MUST listen on 127.0.0.1 only.

upstream wengge_ai_gateway {
    server 127.0.0.1:8787;
    keepalive 16;
}

server {
    # ... existing TLS / server_name for the product origin ...

    location /api/ai/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Streaming / SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 4m;

        proxy_pass http://wengge_ai_gateway;
    }

    location = /healthz {
        # Optional: expose gateway health via a dedicated path or keep product-site health separate.
        proxy_pass http://wengge_ai_gateway/healthz;
    }
}
