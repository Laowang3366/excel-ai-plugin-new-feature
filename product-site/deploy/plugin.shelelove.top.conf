server {
    listen 80;
    listen [::]:80;
    server_name plugin.shelelove.top;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name plugin.shelelove.top;

    ssl_certificate /etc/letsencrypt/live/plugin.shelelove.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plugin.shelelove.top/privkey.pem;

    access_log /var/log/nginx/wenge-product.access.log;
    error_log /var/log/nginx/wenge-product.error.log;
    client_max_body_size 1m;

    location = /releases/windows/latest.yml {
        alias /opt/wenge-product/releases/latest.yml;
        default_type application/octet-stream;
        add_header Cache-Control "no-store" always;
    }

    location /releases/windows/ {
        alias /opt/wenge-product/releases/;
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /_wenge_releases/ {
        internal;
        alias /opt/wenge-product/releases/;
        default_type application/octet-stream;
    }

    location / {
        proxy_pass http://127.0.0.1:18120;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
